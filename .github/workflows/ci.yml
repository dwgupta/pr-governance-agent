name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Build RAG index
        run: python scripts/ingest_docs.py

      - name: Preload reranker model
        run: python -c "from pr_governance_agent.rag.reranker import _load_cross_encoder; _load_cross_encoder('cross-encoder/ms-marco-MiniLM-L-6-v2')"

      - name: Run tests
        env:
          USE_PR_FIXTURE: "true"
          HEURISTIC_ONLY: "true"
          RAG_RERANK_ENABLED: "true"
          LANGSMITH_TRACING: "false"
        run: pytest tests/ -q

      - name: Run offline eval
        env:
          USE_PR_FIXTURE: "true"
          HEURISTIC_ONLY: "true"
          RAG_RERANK_ENABLED: "true"
          LANGSMITH_TRACING: "false"
        run: python eval/run_eval.py

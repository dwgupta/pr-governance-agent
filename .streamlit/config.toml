# Streamlit server config for PR Governance Agent.
#
# The reranker uses sentence-transformers → transformers. Streamlit's default
# file watcher introspects every transformers vision submodule and logs errors
# when torchvision is not installed (not required for this app).
[server]
fileWatcherType = "none"

[theme]
base = "light"
primaryColor = "#9B7EDE"
backgroundColor = "#FAFAFC"
secondaryBackgroundColor = "#F0EBFA"
textColor = "#2D2A3E"
font = "sans serif"
